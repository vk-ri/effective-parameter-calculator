<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PCB 等效導熱係數 (kz & kxy) 計算機 - 暗黑版</title>
    <style>
        :root {
            /* 暗黑模式配色碼 */
            --primary: #3b82f6;
            --primary-hover: #2563eb;
            --bg-color: #121212;
            --card-bg: #1e1e1e;
            --section-bg: #27272a;
            --border: #3f3f46;
            --text-main: #f4f4f5;
            --text-muted: #a1a1aa;
            --input-bg: #3f3f46;
            --input-focus: #52525b;
            --table-header: #333338;
            --via-bg: #333338;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
            line-height: 1.6;
        }
        .container {
            max-width: 1000px;
            margin: 0 auto;
            background: var(--card-bg);
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.5);
        }
        h1 { text-align: center; color: var(--primary); border-bottom: 2px solid var(--border); padding-bottom: 10px; }
        .section { margin-bottom: 25px; padding: 15px; border: 1px solid var(--border); border-radius: 8px; background-color: var(--section-bg); }
        .grid-4 { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; }
        
        label { font-weight: 600; display: block; margin-bottom: 5px; font-size: 0.9em; color: var(--text-main); }
        .small-txt { font-size: 0.8em; color: var(--text-muted); font-weight: normal; }
        
        input { 
            width: 100%; padding: 8px; 
            border: 1px solid var(--border); border-radius: 4px; box-sizing: border-box; 
            background-color: var(--input-bg); color: #ffffff;
            transition: background-color 0.3s, border-color 0.3s;
        }
        input:focus { background-color: var(--input-focus); border-color: var(--primary); outline: none; }
        
        button {
            background-color: var(--primary); color: white; border: none;
            padding: 8px 12px; border-radius: 5px; cursor: pointer;
            font-weight: bold; transition: all 0.3s ease;
        }
        button:hover { background-color: var(--primary-hover); transform: translateY(-1px); }
        
        .btn-add-cu { background-color: #d97706; }
        .btn-add-cu:hover { background-color: #b45309; }
        .btn-add-die { background-color: #059669; }
        .btn-add-die:hover { background-color: #047857; }
        .btn-add-via { background-color: #4b5563; font-size: 0.8em; padding: 5px 10px; margin-bottom: 10px; }
        .btn-add-via:hover { background-color: #374151; }
        .btn-remove { background-color: #ef4444; padding: 5px 10px; font-size: 0.8em; }
        .btn-remove:hover { background-color: #b91c1c; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { border: 1px solid var(--border); padding: 10px; text-align: left; vertical-align: top; }
        th { background-color: var(--table-header); color: #ffffff; }
        .layer-cu { border-left: 5px solid #fbbf24; }
        .layer-die { border-left: 5px solid #34d399; }
        
        /* Via 容器樣式 */
        .via-group {
            display: grid; grid-template-columns: 1fr 1fr 1fr auto; gap: 10px;
            background: var(--via-bg); padding: 10px; border-radius: 6px; margin-bottom: 8px;
            align-items: end; border: 1px solid #4b5563;
        }
        
        #result-box { display: none; margin-top: 25px; }
        .result-cards { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }
        .card { padding: 25px; border-radius: 10px; text-align: center; color: white; box-shadow: 0 4px 6px rgba(0,0,0,0.3); }
        .card-z { background: linear-gradient(135deg, #2563eb, #1e3a8a); }
        .card-xy { background: linear-gradient(135deg, #059669, #064e3b); }
        .val { font-size: 2.8em; font-weight: bold; margin: 10px 0; text-shadow: 1px 1px 2px rgba(0,0,0,0.5); }
        
        .log-box { background: #27272a; padding: 15px; border-radius: 8px; border: 1px solid #3f3f46; }
        .log-box h3 { margin-top: 0; color: #93c5fd; font-size: 1.1em; border-bottom: 1px solid #3f3f46; padding-bottom: 8px; }
        #res_log li { margin-bottom: 5px; }
    </style>
</head>
<body>

<div class="container">
    <h1>PCB 等效導熱係數 (kz & kxy) 計算機</h1>
    
    <!-- 基礎參數設定 -->
    <div class="section grid-4">
        <div>
            <label>計算區域長度 L (mm)</label>
            <input type="number" id="pcb_l" value="47.73" step="0.1">
        </div>
        <div>
            <label>計算區域寬度 W (mm)</label>
            <input type="number" id="pcb_w" value="47.73" step="0.1">
        </div>
        <div>
            <label>銅導熱係數 (W/m·K)</label>
            <input type="number" id="k_cu" value="390">
        </div>
        <div>
            <label>介電材導熱係數 (W/m·K)</label>
            <input type="number" id="k_die" value="0.1" step="0.01">
        </div>
    </div>

    <!-- 疊構設定 -->
    <div class="section">
        <div style="display: flex; gap: 10px; margin-bottom: 15px;">
            <button class="btn-add-cu" onclick="addLayer('cu')">+ 新增銅箔層 (Copper)</button>
            <button class="btn-add-die" onclick="addLayer('die')">+ 新增介電層 (Dielectric)</button>
        </div>
        
        <table id="stackup-table">
            <thead>
                <tr>
                    <th width="12%">層別</th>
                    <th width="12%">厚度 t (mm)</th>
                    <th width="66%">詳細參數 (鋪銅率 / Via多重設定)</th>
                    <th width="10%">操作</th>
                </tr>
            </thead>
            <tbody id="stackup-body">
                <!-- 動態生成的層 -->
            </tbody>
        </table>
    </div>

    <div style="text-align: center;">
        <button onclick="calculate()" style="font-size: 1.2em; padding: 15px 40px; background-color: #3b82f6; box-shadow: 0 4px 6px rgba(0,0,0,0.3);">🚀 開始計算</button>
    </div>

    <!-- 結果顯示區 -->
    <div id="result-box">
        <h2 style="text-align: left; color: #60a5fa; margin-bottom: 10px;">📊 計算結果</h2>
        <div style="margin-bottom: 15px; font-size: 1.1em; color: #e2e8f0;">
            <strong>總厚度：</strong> <span id="res_t" style="color: #fbbf24; font-weight: bold; font-size: 1.2em;"></span> mm
        </div>
        
        <div class="result-cards">
            <div class="card card-z">
                <h3>垂直方向 (Z 軸) 導熱係數</h3>
                <div class="small-txt" style="color:#bfdbfe;">(串聯模型，受 Via 影響極大)</div>
                <div class="val" id="res_kz">--</div>
                <div>W/m·K</div>
            </div>
            <div class="card card-xy">
                <h3>平面方向 (X,Y 軸) 導熱係數</h3>
                <div class="small-txt" style="color:#a7f3d0;">(並聯模型，主要受銅箔層與厚度影響)</div>
                <div class="val" id="res_kxy">--</div>
                <div>W/m·K</div>
            </div>
        </div>

        <div class="log-box">
            <h3>各層詳細解析：</h3>
            <ul id="res_log" style="font-size: 0.95em; color: #d4d4d8; margin: 0; padding-left: 20px;"></ul>
        </div>
    </div>
</div>

<script>
    window.onload = function() {
        addLayer('cu', 0.06096, 80);
        
        let die1 = addLayer('die', 0.1778);
        addVia(die1.querySelector('.via-container'), 352, 0.3048, 0.2);
        addVia(die1.querySelector('.via-container'), 80, 0.2032, 0.2);
        
        addLayer('cu', 0.08128, 83);
        
        let die2 = addLayer('die', 0.0254);
        addVia(die2.querySelector('.via-container'), 352, 0.3048, 0.2);
        addVia(die2.querySelector('.via-container'), 80, 0.2032, 0.2);
    };

    function addLayer(type, defaultThick = '', defaultCov = '') {
        const tbody = document.getElementById('stackup-body');
        const tr = document.createElement('tr');
        tr.className = type === 'cu' ? 'layer-cu layer-row' : 'layer-die layer-row';
        tr.dataset.type = type;

        let detailHtml = '';
        if (type === 'cu') {
            detailHtml = `
                <label>鋪銅率 Coverage (%)</label>
                <input type="number" class="cu-cov" value="${defaultCov}" step="0.1" placeholder="例如: 80">
            `;
        } else {
            detailHtml = `
                <button class="btn-add-via" onclick="addVia(this.nextElementSibling, 0, '', '')">+ 新增 Via 規格</button>
                <div class="via-container"></div>
            `;
        }

        tr.innerHTML = `
            <td><strong><span style="color:${type === 'cu' ? '#fbbf24' : '#34d399'}">${type === 'cu' ? '銅箔層<br>(Copper)' : '介電層<br>(Dielectric)'}</span></strong></td>
            <td><input type="number" class="layer-t" value="${defaultThick}" step="0.001"></td>
            <td>${detailHtml}</td>
            <td style="text-align: center;"><button class="btn-remove" onclick="this.closest('tr').remove()">刪除此層</button></td>
        `;
        tbody.appendChild(tr);
        return tr;
    }

    function addVia(container, n, d, plat) {
        const viaDiv = document.createElement('div');
        viaDiv.className = 'via-group';
        viaDiv.innerHTML = `
            <div>
                <label class="small-txt">數量 (個)</label>
                <input type="number" class="via-n" value="${n || ''}" placeholder="0">
            </div>
            <div>
                <label class="small-txt">外徑 D (mm)</label>
                <input type="number" class="via-d" value="${d || ''}" step="0.001" placeholder="0.3">
            </div>
            <div>
                <label class="small-txt">孔壁厚度 (mm)</label>
                <input type="number" class="via-plat" value="${plat || ''}" step="0.001" placeholder=">=半徑視為實心">
            </div>
            <button class="btn-remove" onclick="this.parentElement.remove()" style="margin-bottom:2px;">X</button>
        `;
        container.appendChild(viaDiv);
    }

    function calculate() {
        const L = parseFloat(document.getElementById('pcb_l').value);
        const W = parseFloat(document.getElementById('pcb_w').value);
        const k_cu = parseFloat(document.getElementById('k_cu').value);
        const k_die = parseFloat(document.getElementById('k_die').value);
        const area = L * W;

        if (isNaN(area) || area <= 0) { alert("請輸入有效的計算區域長度與寬度！"); return; }
        const rows = document.querySelectorAll('.layer-row');
        if (rows.length === 0) { alert("請至少新增一個疊層！"); return; }

        let total_t = 0;
        let total_R_prime = 0; 
        let total_kt = 0;      
        let logHtml = '';
        let isValid = true;

        rows.forEach((row, index) => {
            const type = row.dataset.type;
            const t = parseFloat(row.querySelector('.layer-t').value);

            if (isNaN(t) || t <= 0) { alert(`第 ${index + 1} 層的厚度無效！`); isValid = false; return; }

            let kz_layer = 0;
            let kxy_layer = 0;

            if (type === 'cu') {
                const cov = parseFloat(row.querySelector('.cu-cov').value) / 100;
                if (isNaN(cov) || cov < 0 || cov > 1) { alert(`第 ${index + 1} 層的鋪銅率無效！`); isValid = false; return; }
                kz_layer = cov * k_cu + (1 - cov) * k_die;
                kxy_layer = kz_layer;
                
                logHtml += `<li><strong><span style="color:#fbbf24">第 ${index + 1} 層 (銅箔):</span></strong> t = ${t} mm | 鋪銅 = ${(cov*100).toFixed(1)}% | kz = ${kz_layer.toFixed(2)}, kxy = ${kxy_layer.toFixed(2)}</li>`;
            
            } else if (type === 'die') {
                let total_via_area = 0;
                const viaGroups = row.querySelectorAll('.via-group');
                
                viaGroups.forEach(vg => {
                    const n = parseFloat(vg.querySelector('.via-n').value) || 0;
                    const d = parseFloat(vg.querySelector('.via-d').value) || 0;
                    const plat = parseFloat(vg.querySelector('.via-plat').value) || 0;

                    if (n > 0 && d > 0) {
                        const r = d / 2;
                        if (plat >= r) {
                            total_via_area += n * Math.PI * r * r; 
                        } else if (plat > 0) {
                            const r_inner = r - plat;
                            total_via_area += n * Math.PI * (r * r - r_inner * r_inner); 
                        }
                    }
                });

                const beta = Math.min(1, total_via_area / area); 
                kz_layer = beta * k_cu + (1 - beta) * k_die;
                kxy_layer = k_die; 

                logHtml += `<li><strong><span style="color:#34d399">第 ${index + 1} 層 (介電):</span></strong> t = ${t} mm | Via 佔比 = ${(beta*100).toFixed(4)}% | kz = ${kz_layer.toFixed(4)}, kxy = ${kxy_layer.toFixed(4)}</li>`;
            }

            total_t += t;
            total_R_prime += (t / kz_layer);
            total_kt += (t * kxy_layer);
        });

        if (!isValid) return;

        const k_eff_z = total_t / total_R_prime;
        const k_eff_xy = total_kt / total_t;

        document.getElementById('res_t').innerText = total_t.toFixed(4);
        document.getElementById('res_kz').innerText = k_eff_z.toFixed(2);
        document.getElementById('res_kxy').innerText = k_eff_xy.toFixed(2);
        document.getElementById('res_log').innerHTML = logHtml;
        document.getElementById('result-box').style.display = 'block';
    }
</script>

</body>
</html>
